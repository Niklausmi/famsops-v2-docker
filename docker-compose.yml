# ============================================================
#  Famsops v2 — Docker Compose
#  Usage:
#    ./start.sh          → first run (builds + seeds)
#    ./start.sh start    → start without seeding
#    ./start.sh stop     → stop all
#    ./start.sh reset    → wipe volumes, rebuild, reseed
#    ./start.sh logs     → tail all logs
#    ./start.sh build    → rebuild images only
# ============================================================

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: famsops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-famsops}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-famsops_dev_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - famsops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-famsops}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - famsops-net

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./famsops-backend
      dockerfile: Dockerfile
    container_name: famsops-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:   postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-famsops_dev_pass}@postgres:5432/${POSTGRES_DB:-famsops}
      DB_SSL:         "false"
      JWT_SECRET:     ${JWT_SECRET:-famsops-dev-jwt-secret-change-in-production-64chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      PORT:           4000
      NODE_ENV:       ${NODE_ENV:-production}
      FRONTEND_URL:   http://localhost:${FRONTEND_PORT:-80}
      SEED:           ${SEED:-false}
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - famsops-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (nginx + built React) ──────────────────────────
  frontend:
    build:
      context: ./famsops-frontend
      dockerfile: Dockerfile
      args:
        # API calls go through nginx proxy on the same host — no CORS
        VITE_API_URL: /api/v1
    container_name: famsops-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - famsops-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  famsops-net:
    driver: bridge

volumes:
  famsops_pgdata:
    name: famsops_pgdata
